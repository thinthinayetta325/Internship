<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      h2 {
        width: 400px;
        height: 200px;
        border-radius: 10px;
        border: 1px solid #13030341;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: beige;
      }
      .f-inner {
        background-color: aquamarine;
        width: 600px;
        height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
      }
      .f-outer {
        background-color: rgb(152, 188, 219);
        width: 1000px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 30px;
        border-radius: 10px;
        margin-left: 30px;
      }
    </style>
  </head>
  <body>
    <div class="f-outer">
      <div class="f-inner">
        <h2>Card Content</h2>
      </div>
    </div>
  </body>
</html>
