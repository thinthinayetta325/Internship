<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone Calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
      }
      .container {
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        border: 1px solid white;
        background: rgb(221, 174, 174);
        width: 250px;
        padding: 15px;
        border-radius: 10px;
      }
      #screen {
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 10px;
        width: 100%;
        font-size: 20px;
        background-color: rgba(255, 255, 255, 0.3);
        margin-bottom: 15px;
        outline: none;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        justify-content: center;
      }
      button {
        border-radius: 50%;
        height: 40px;
        width: 40px;
        margin: 6px 9px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      .clear {
        color: brown;
      }
      .operator {
        color: #ff4355;
      }
      .equal {
        background: #ff4355;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <input
        type="text"
        id="screen"
        placeholder="0"
        oninput="syncOutput(this.value)"
      />
      <!-- onclick="syncOutput(this.value)" -->

      <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue(7)">7</button>
        <button onclick="appendValue(8)">8</button>
        <button onclick="appendValue(9)">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue(4)">4</button>
        <button onclick="appendValue(5)">5</button>
        <button onclick="appendValue(6)">6</button>
        <button class="operator" onclick="appendValue('-')">-</button>

        <button onclick="appendValue(1)">1</button>
        <button onclick="appendValue(2)">2</button>
        <button onclick="appendValue(3)">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="appendValue(0)">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>

    <script>
      let output = "";
      const screen = document.getElementById("screen");

      function updateScreen() {
        screen.value = output;
      }

      function syncOutput(val) {
        output = val;
      }

      function appendValue(value) {
        const operators = ["+", "-", "*", "/", ".", "%"];

        // Prevent double operators consecutively
        if (operators.includes(value) && operators.includes(output.slice(-1))) {
          return;
        }

        // Handle insertion at cursor position
        let startPos = screen.selectionStart;
        let endPos = screen.selectionEnd;

        if (startPos || startPos == "0") {
          output =
            output.substring(0, startPos) +
            value +
            output.substring(endPos, output.length);
          updateScreen();
          // Maintain cursor position
          setTimeout(() => {
            screen.setSelectionRange(startPos + 1, startPos + 1);
            screen.focus();
          }, 0);
        } else {
          output += value;
          updateScreen();
        }
      }

      function clearScreen() {
        output = "";
        updateScreen();
      }

      function deleteLast() {
        let startPos = screen.selectionStart;

        let endPos = screen.selectionEnd;

        if (startPos > 0) {
          output =
            output.substring(0, startPos - 1) +
            output.substring(endPos, output.length);
          updateScreen();
          setTimeout(() => {
            screen.setSelectionRange(startPos - 1, startPos - 1);
            screen.focus();
          }, 0);
        } else {
          output = output.slice(0, -1);
          updateScreen();
        }
      }

      function calculate() {
        try {
          // Check specifically for division by zero (Mathematical zero)
          // This regex looks for '/' followed by '0' that isn't followed by a decimal point or other digits
          // and ensures it's not part of a larger number like 10.
          if (/\/0(?![.0-9])/.test(output)) {
            output = "Cannot divide by 0";
            updateScreen();
            output = "";
            return;
          }

          let result = eval(output);

          if (!isFinite(result)) {
            output = "Error";
          } else {
            // Limit to 6 decimal places if result is not an integer
            if (Number.isInteger(result)) {
              output = result.toString();
            } else {
              output = parseFloat(result.toFixed(6)).toString();
            }
          }
          updateScreen();
        } catch (e) {
          output = "Error";
          updateScreen();
          output = "";
        }
      }
    </script>
  </body>
</html>
