<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=P, initial-scale=1.0" />
    <title>Phone Calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        box-shadow: 0 0 10px whitesmoke;
        border: 1px solid white;
        background: rgb(221, 174, 174);
        width: 250px;
        height: 480px;
        /* padding-top: 100px; */
        margin: auto;
        border-radius: 10px;
        justify-content: center;
      }
      button {
        border-radius: 50%;
        height: 40px;
        width: 40px;
        margin: 6px 9px;
        border: none;
      }
      #screen {
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 10px;
        width: 95%;
        font-size: 20px;
        background-color: rgb(221, 174, 174);
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }
      .clear {
        color: brown;
      }
      .operator {
        color: #ff4355;
      }
      .equal {
        background: #ff4355;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="text" id="screen" name="screen" placeholder="0" />
      <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue(7)">7</button>
        <button onclick="appendValue(8)">8</button>
        <button onclick="appendValue(9)">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue(4)">4</button>
        <button onclick="appendValue(5)">5</button>
        <button onclick="appendValue(6)">6</button>
        <button class="operator" onclick="appendValue('-')">-</button>

        <button onclick="appendValue(1)">1</button>
        <button onclick="appendValue(2)">2</button>
        <button onclick="appendValue(3)">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>

        <button onclick="appendValue(0)">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>
    <script>
      let output = "";

      function updateScreen() {
        document.getElementById("screen").value = output;
      }

      function appendValue(value) {
        output += value;
        updateScreen();
      }
      function clearScreen() {
        output = "";
        updateScreen();
      }
      function deleteLast() {
        output = output.slice(0, -1);
        updateScreen();
      }
      function calculate() {
        try {
          output = eval(output).toString();
          updateScreen();
        } catch {
          output = "Error";
          updateScreen();
        }
        // function addBracket() {
        //   openBracket = true;

        //   if (openBracket) {
        //     output += "(";
        //   } else {
        //     output += ")";
        //   }
        //   openBracket != openBracket;
        //   updateScreen();
        // }
      }
    </script>
  </body>
</html>
