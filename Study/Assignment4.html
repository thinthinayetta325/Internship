<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        background: #f0f2f5;
        margin: 40px;
      }
      h2 {
        margin-bottom: 20px;
      }
      .calculator {
        background-color: aliceblue;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px gray;
        width: 350px;
        padding: 30px;
      }

      input,
      select {
        width: 80px;
        margin: 5px;
        padding: 10px;
      }
      button {
        background-color: blue;
        width: 100%;
        color: aliceblue;
        border-radius: 10px;
        padding: 15px;
        cursor: pointer;
        border: none;
        margin-top: 15px;
      }
      .result {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 20px;
        color: green;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <h2>Mini Calculator</h2>
      <input type="number" id="num1" />
      <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
      </select>
      <input type="number" id="num2" />
      <button onclick="calculate()">Calculate Amount</button>
      <p>Result:<span id="result"></span></p>
    </div>
    <script>
      function calculate() {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        let operator = document.getElementById("operator").value;
        let result = document.getElementById(" result");
        let answer;
        if (isNaN(num1) || isNaN(num2)) {
          document.getElementById("result").innerHTML = "Missing value";
        }
        if (operator == "+") {
          answer = num1 + num2;
        } else if (operator == "-") {
          answer = num1 - num2;
        } else if (operator == "*") {
          answer = num1 * num2;
        } else if (operator == "/") {
          if (num2 === 0) {
            answer = "Not Divide";
          } else {
            answer = num1 / num2;
          }
          document.getElementById("result").innerHTML = answer;
        }
      }
    </script>
  </body>
</html>
