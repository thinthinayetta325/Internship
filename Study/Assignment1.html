<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live DOM Card</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 30px;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
      }
      .container {
        display: flex;
        gap: 40px;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
      }

      .control,
      .output {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card {
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
        border: 1px solid #444;
        padding: 20px;
        width: 250px;
      }

      .badge {
        display: inline-block;
        font-size: 12px;
        margin-bottom: 10px;
        border-radius: 15px;
        background: gold;
        padding: 5px 10px;
      }

      input {
        padding: 8px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <section class="control">
        <h1>Update Variables</h1>

        <label>Name (String):</label>
        <input
          type="text"
          id="name"
          value="Alex Walker"
          oninput="updateCard()"
        />

        <label>Age (Number):</label>
        <input type="number" id="age" value="23" oninput="updateCard()" />

        <label>VIP Status (Boolean):</label>
        <input type="checkbox" id="vipCheck" checked onchange="updateCard()" />

        <label>Card Color:</label>
        <input
          type="color"
          id="color"
          value="#ffffff"
          onchange="updateCard()"
        />
      </section>

      <section class="output">
        <h2>Live DOM Output</h2>

        <div id="idCard" class="card">
          <div class="card-header">
            <span id="vipBadge" class="badge">VIP MEMBER</span>
          </div>

          <div class="card-body">
            <p id="cardName">Alex Walker</p>
            <p>Age: <span id="cardAge">23</span></p>
          </div>
        </div>
      </section>
    </div>

    <script>
      function updateCard() {
        const nameInput = document.getElementById("name").value;
        const ageInput = document.getElementById("age").value;
        const vipInput = document.getElementById("vipCheck").checked;
        const colorInput = document.getElementById("color").value;

        document.getElementById("cardName").textContent = nameInput;
        document.getElementById("cardAge").textContent = ageInput;
        document.getElementById("idCard").style.backgroundColor = colorInput;

        if (vipInput) {
          document.getElementById("vipBadge").style.display = "inline-block";
        } else {
          document.getElementById("vipBadge").style.display = "none";
        }
      }
    </script>
  </body>
</html>
